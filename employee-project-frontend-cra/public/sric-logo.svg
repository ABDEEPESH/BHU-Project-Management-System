  <text x="400" y="50" text-anchor="middle" fill="#1e3a8a" font-family="Arial" font-size="24" font-weight="bold">प्रायोजित शोध एवं औद्योगिक परामर्श प्रकोष्ठ</text>
  
  <!-- English Text -->
